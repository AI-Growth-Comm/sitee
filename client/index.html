<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Sitee — AI-Powered SEO Audit | AEO &amp; GEO Optimization for ChatGPT, Gemini &amp; Google</title>
    <meta name="description" content="Get a complete AI-powered SEO audit in 60 seconds. Sitee scores 8 SEO dimensions, finds keyword opportunities, rewrites metadata, generates schema markup, and builds a 90-day content calendar. Optimized for Google, ChatGPT, Claude, Gemini, Perplexity, Grok, and Manus AI." />
    <meta name="keywords" content="SEO audit tool, AI SEO, AEO optimization, GEO optimization, ChatGPT SEO, Gemini SEO, Perplexity SEO, answer engine optimization, generative engine optimization, keyword research, schema markup, meta description generator, content calendar, SEO checklist" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sitee" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sitee — AI-Powered SEO Audit in 60 Seconds" />
    <meta property="og:description" content="Complete SEO audit with keyword opportunities, metadata rewrites, schema markup, 90-day content calendar, and AI search optimization for ChatGPT, Gemini, Perplexity &amp; more." />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sitee — AI-Powered SEO Audit in 60 Seconds" />
    <meta name="twitter:description" content="Complete SEO audit with keyword opportunities, metadata rewrites, schema markup, 90-day content calendar, and AI search optimization." />
    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Sitee",
      "description": "AI-powered SEO audit tool that scores 8 SEO dimensions, finds keyword opportunities, rewrites metadata, generates schema markup, and builds a 90-day content calendar. Optimized for Google, ChatGPT, Claude, Gemini, Perplexity, Grok, and Manus AI.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free SEO audit with no credit card required"
      },
      "featureList": [
        "8-dimension SEO health score",
        "Keyword opportunity mapping",
        "AI metadata rewrites",
        "Schema markup generation",
        "90-day content calendar",
        "Answer Engine Optimization (AEO)",
        "Generative Engine Optimization (GEO)",
        "Prioritized action checklist"
      ]
    }
    </script>
    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is SEO and why does my business need it?",
          "acceptedAnswer": { "@type": "Answer", "text": "Search Engine Optimization (SEO) is the process of improving your website so it appears higher in Google, Bing, and AI search results when potential customers search for your products or services. Without SEO, your website is essentially invisible. Sitee audits your site and gives you a step-by-step plan to get found." }
        },
        {
          "@type": "Question",
          "name": "Does Sitee optimize for ChatGPT, Gemini, and other AI search engines?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Sitee is built for the AI search era. It audits your site against the signals used by ChatGPT, Claude, Gemini, Perplexity, Grok, Manus, and Google AI Overviews including structured data, E-E-A-T, topical authority, and answer-ready content formatting. This is called Answer Engine Optimization (AEO) and Generative Engine Optimization (GEO)." }
        },
        {
          "@type": "Question",
          "name": "How quickly will I see results after implementing Sitee recommendations?",
          "acceptedAnswer": { "@type": "Answer", "text": "Technical fixes like meta tags and schema markup can show results in 2-4 weeks. Content improvements typically take 60-90 days to reflect in rankings. AI search visibility can improve faster, often within 2-3 weeks of adding proper structured data." }
        },
        {
          "@type": "Question",
          "name": "Is my audit data private and secure?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Each account's audit data is completely private and isolated. No other user can access your audits or reports. Sitee does not share your website data with third parties." }
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
